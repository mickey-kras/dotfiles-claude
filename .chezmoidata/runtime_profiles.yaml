# Transitional: kept only for runtime parity tests.
# Source of truth is packs/*/pack.yaml profiles and guardrails.
catalog_version: 1

profiles:
  restricted:
    description: No local or system mutation by default. Remote work systems are allowed.
    permission_groups:
      - core_read_write
      - shell_readonly
      - git_safe
      - gh_safe
  balanced:
    description: Practical daily-driver profile with moderate local execution power.
    permission_groups:
      - core_read_write
      - shell_readonly
      - git_full
      - gh_full
      - dev_runtime
      - local_file_mutation
      - containers
      - infra_local
  open:
    description: Full managed profile with broader web, cloud, and secret-backed capabilities.
    permission_groups:
      - core_read_write
      - shell_readonly
      - git_full
      - gh_full
      - dev_runtime
      - local_file_mutation
      - containers
      - infra_local
      - package_runtime
      - cloud_extended
      - secret_tools
      - web_access

