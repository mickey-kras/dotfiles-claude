permission_groups:
  core_read_write:
    - Read
    - Edit
    - Write
  shell_readonly:
    - Bash(ls *)
    - Bash(cat *)
    - Bash(head *)
    - Bash(tail *)
    - Bash(wc *)
    - Bash(find *)
    - Bash(grep *)
    - Bash(rg *)
    - Bash(jq *)
  git_safe:
    - Bash(git status*)
    - Bash(git diff*)
    - Bash(git log*)
  gh_safe:
    - Bash(gh pr view*)
    - Bash(gh pr checks*)
  git_full:
    - Bash(git *)
  gh_full:
    - Bash(gh *)
  dev_runtime:
    - Bash(node *)
    - Bash(dotnet *)
    - Bash(python3 *)
    - Bash(pytest *)
    - Bash(make *)
    - Bash(k6 *)
  local_file_mutation:
    - Bash(mkdir *)
    - Bash(cp *)
    - Bash(mv *)
    - Bash(touch *)
    - Bash(chmod +x *)
  containers:
    - Bash(docker *)
  infra_local:
    - Bash(az *)
    - Bash(terraform *)
    - Bash(kubectl *)
  package_runtime:
    - Bash(npm *)
    - Bash(npx *)
    - Bash(pip *)
  cloud_extended:
    - Bash(aws *)
    - Bash(gcloud *)
    - Bash(wrangler *)
  secret_tools:
    - Bash(bw *)
    - Bash(uvx *)
  web_access:
    - Bash(curl *)
    - WebFetch
    - WebSearch

hard_bans:
  shared:
    - Bash(sudo *)
    - Bash(su *)
    - Bash(rm -rf /)
    - Bash(dd if=/dev/zero*)
    - Bash(chmod 777 *)
    - Bash(> /dev/sda*)
  restricted:
    - Bash(uv *)
    - Bash(uvx *)
    - Bash(npm install*)
    - Bash(npm i*)
    - Bash(npx *)
    - Bash(pip install*)
    - Bash(choco install*)
    - Bash(winget install*)
