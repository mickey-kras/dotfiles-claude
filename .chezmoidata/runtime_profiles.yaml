mcp_catalog:
  playwright:
    transport: stdio
    needs_secrets: false
    reads_remote: true
    writes_remote: false
    reads_local: false
    executes_local_processes: true
    mutates_local_system: false
    prompt_injection_risk: medium
    notes: Browser automation against potentially hostile pages.
  context7:
    transport: http
    needs_secrets: false
    reads_remote: true
